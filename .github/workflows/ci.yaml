name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    container: rust:1.85
    steps:
      - uses: actions/checkout@v4

      - name: cargo check
        run: cargo check

      - name: cargo test
        run: cargo test

      - name: cargo check (https feature)
        run: cargo check --features https
