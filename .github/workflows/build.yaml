name: Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 0.1.0)"
        required: true
      pkg_release:
        description: "Package release number"
        default: "1"
  push:
    tags: ["v*"]

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      pkg_release: ${{ steps.v.outputs.pkg_release }}
    steps:
      - name: Determine version
        id: v
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "pkg_release=${{ inputs.pkg_release }}" >> "$GITHUB_OUTPUT"
          else
            TAG="${{ github.ref_name }}"
            echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
            echo "pkg_release=1" >> "$GITHUB_OUTPUT"
          fi

  compile:
    runs-on: ubuntu-latest
    container:
      image: opensuse/tumbleweed
      options: --env PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - openwrt_arch: aarch64_cortex-a53
            nim_target: aarch64
            musl_arch: aarch64
            musl_triple: aarch64-linux-musl
          - openwrt_arch: arm_cortex-a7
            nim_target: armv7hf
            musl_arch: arm
            musl_triple: arm-linux-musleabihf
            musl_configure_extra: "--with-arch=armv7-a --with-fpu=vfpv3-d16 --with-float=hard"
          - openwrt_arch: mips_24kc
            nim_target: mips
            musl_arch: mips
            musl_triple: mips-linux-musl
          - openwrt_arch: mipsel_24kc
            nim_target: mipsel
            musl_arch: mipsel
            musl_triple: mipsel-linux-musl
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          zypper --non-interactive install \
            clang lld llvm git make cmake ninja curl tar xz gzip bzip2 which mbedtls-devel
          curl https://nim-lang.org/choosenim/init.sh -sSf | bash -s -- -y --version 2.2.8
          echo "$HOME/.nimble/bin" >> $GITHUB_PATH

      - name: Install nim-mbedtls
        run: |
          export PATH="$HOME/.nimble/bin:$PATH"
          nimble install -y https://github.com/coreyleavitt/nim-mbedtls

      - name: Build musl sysroot
        env:
          MUSL_VERSION: "1.2.5"
        run: |
          export PATH="$HOME/.nimble/bin:$PATH"
          mkdir -p /tmp/musl-build && cd /tmp/musl-build
          curl -LO "https://musl.libc.org/releases/musl-${MUSL_VERSION}.tar.gz"
          tar xf "musl-${MUSL_VERSION}.tar.gz"
          cd "musl-${MUSL_VERSION}"

          # Cross-compile musl using clang targeting the arch
          CC="clang --target=${{ matrix.musl_triple }}" \
          AR=llvm-ar \
          RANLIB=llvm-ranlib \
          ./configure \
            --prefix=/opt/musl/${{ matrix.nim_target }} \
            --target=${{ matrix.musl_triple }} \
            --disable-shared \
            ${{ matrix.musl_configure_extra || '' }}
          make -j$(nproc)
          make install

          # Verify sysroot
          ls -la /opt/musl/${{ matrix.nim_target }}/lib/libc.a
          ls -la /opt/musl/${{ matrix.nim_target }}/include/stdio.h

      - name: Build compiler-rt builtins
        env:
          LLVM_VERSION: "19.1.7"
        run: |
          cd /tmp

          # Download full llvm-project source (compiler-rt needs the cmake modules
          # from the top-level project, not just the compiler-rt subdirectory)
          curl -LO "https://github.com/llvm/llvm-project/releases/download/llvmorg-${LLVM_VERSION}/llvm-project-${LLVM_VERSION}.src.tar.xz"
          tar xf "llvm-project-${LLVM_VERSION}.src.tar.xz"

          mkdir -p build-rt && cd build-rt
          cmake "/tmp/llvm-project-${LLVM_VERSION}.src/compiler-rt" \
            -G Ninja \
            -DCMAKE_AR=$(which llvm-ar) \
            -DCMAKE_NM=$(which llvm-nm) \
            -DCMAKE_RANLIB=$(which llvm-ranlib) \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_C_COMPILER_TARGET="${{ matrix.musl_triple }}" \
            -DCMAKE_C_FLAGS="--sysroot=/opt/musl/${{ matrix.nim_target }}" \
            -DCMAKE_ASM_COMPILER_TARGET="${{ matrix.musl_triple }}" \
            -DCMAKE_ASM_FLAGS="--sysroot=/opt/musl/${{ matrix.nim_target }}" \
            -DCMAKE_SYSROOT="/opt/musl/${{ matrix.nim_target }}" \
            -DCMAKE_EXE_LINKER_FLAGS="-fuse-ld=lld" \
            -DCMAKE_TRY_COMPILE_TARGET_TYPE=STATIC_LIBRARY \
            -DCOMPILER_RT_BUILD_BUILTINS=ON \
            -DCOMPILER_RT_BUILD_CRT=ON \
            -DCOMPILER_RT_BUILD_SANITIZERS=OFF \
            -DCOMPILER_RT_BUILD_XRAY=OFF \
            -DCOMPILER_RT_BUILD_LIBFUZZER=OFF \
            -DCOMPILER_RT_BUILD_PROFILE=OFF \
            -DCOMPILER_RT_BUILD_MEMPROF=OFF \
            -DCOMPILER_RT_BUILD_ORC=OFF \
            -DCOMPILER_RT_DEFAULT_TARGET_ONLY=ON \
            -DCOMPILER_RT_INCLUDE_TESTS=OFF \
            -DLLVM_CMAKE_DIR="/tmp/llvm-project-${LLVM_VERSION}.src/cmake/Modules"
          ninja builtins crt

          # Install to clang's resource directory so -rtlib=compiler-rt finds them
          CLANG_RT_DIR=$(clang --print-resource-dir)/lib/linux
          mkdir -p "$CLANG_RT_DIR"
          cp lib/linux/*.a "$CLANG_RT_DIR/" 2>/dev/null || true
          cp lib/linux/*.o "$CLANG_RT_DIR/" 2>/dev/null || true
          ls -la "$CLANG_RT_DIR/"

      - name: Cross-compile nopal
        run: |
          export PATH="$HOME/.nimble/bin:$PATH"
          nim c -d:release -d:${{ matrix.nim_target }} src/nopal.nim

      - name: Prepare binary
        run: |
          mv src/nopal nopald
          ls -lh nopald

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.openwrt_arch }}
          path: nopald

  package-ipk:
    needs: [resolve-version, compile]
    uses: ./.github/workflows/package-ipk.yaml
    with:
      version: ${{ needs.resolve-version.outputs.version }}
      pkg_release: ${{ needs.resolve-version.outputs.pkg_release }}

  package-apk:
    needs: [resolve-version, compile]
    uses: ./.github/workflows/package-apk.yaml
    with:
      version: ${{ needs.resolve-version.outputs.version }}
      pkg_release: ${{ needs.resolve-version.outputs.pkg_release }}

  release:
    needs: [resolve-version, compile, package-ipk, package-apk]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          for dir in artifacts/binary-*; do
            arch="${dir#artifacts/binary-}"
            cp "$dir/nopald" "release/nopald_${arch}"
          done
          for dir in artifacts/ipk-*; do
            cp "$dir"/*.ipk release/
          done
          for dir in artifacts/apk-*; do
            cp "$dir"/*.apk release/
          done
          cd release && sha256sum * > SHA256SUMS

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.resolve-version.outputs.version }}
          files: release/*
          generate_release_notes: true
