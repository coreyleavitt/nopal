name: Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 0.1.0)"
        required: true
      pkg_release:
        description: "Package release number"
        default: "1"
  push:
    tags: ["v*"]

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      pkg_release: ${{ steps.v.outputs.pkg_release }}
    steps:
      - name: Determine version
        id: v
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "pkg_release=${{ inputs.pkg_release }}" >> "$GITHUB_OUTPUT"
          else
            TAG="${{ github.ref_name }}"
            echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
            echo "pkg_release=1" >> "$GITHUB_OUTPUT"
          fi

  compile:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/coreyleavitt/nopal-toolchain:latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - openwrt_arch: aarch64_cortex-a53
            nim_target: aarch64
          - openwrt_arch: arm_cortex-a7
            nim_target: armv7hf
          - openwrt_arch: mips_24kc
            nim_target: mips
          - openwrt_arch: mipsel_24kc
            nim_target: mipsel
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: nim c -d:release -d:https -d:${{ matrix.nim_target }} src/nopal.nim

      - name: Prepare binary
        run: |
          mv src/nopal nopald
          ls -lh nopald
          file nopald

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.openwrt_arch }}
          path: nopald

  package-ipk:
    needs: [resolve-version, compile]
    uses: ./.github/workflows/package-ipk.yaml
    with:
      version: ${{ needs.resolve-version.outputs.version }}
      pkg_release: ${{ needs.resolve-version.outputs.pkg_release }}

  package-apk:
    needs: [resolve-version, compile]
    uses: ./.github/workflows/package-apk.yaml
    with:
      version: ${{ needs.resolve-version.outputs.version }}
      pkg_release: ${{ needs.resolve-version.outputs.pkg_release }}

  release:
    needs: [resolve-version, compile, package-ipk, package-apk]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          for dir in artifacts/binary-*; do
            arch="${dir#artifacts/binary-}"
            cp "$dir/nopald" "release/nopald_${arch}"
          done
          for dir in artifacts/ipk-*; do
            cp "$dir"/*.ipk release/
          done
          for dir in artifacts/apk-*; do
            cp "$dir"/*.apk release/
          done
          cd release && sha256sum * > SHA256SUMS

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.resolve-version.outputs.version }}
          files: release/*
          generate_release_notes: true
