name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type (use "none" to only increment prerelease number)'
        required: true
        type: choice
        options:
          - none
          - patch
          - minor
          - major
          - stable
      prerelease:
        description: 'Prerelease label (or none for stable release)'
        required: true
        default: 'no'
        type: choice
        options:
          - 'no'
          - alpha
          - beta
          - rc

permissions:
  contents: write

jobs:
  prepare-version:
    name: Prepare version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      commit_sha: ${{ steps.version.outputs.commit_sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute and apply version
        id: version
        run: |
          BUMP="${{ inputs.bump }}"
          PRERELEASE="${{ inputs.prerelease }}"

          # Read current version from nopal.nimble.
          CURRENT=$(grep '^version' nopal.nimble | head -1 | sed 's/version *= *"\(.*\)"/\1/')
          echo "Current version: $CURRENT"

          # Parse current version.
          BASE=$(echo "$CURRENT" | sed 's/-.*//')
          MAJOR=$(echo "$BASE" | cut -d. -f1)
          MINOR=$(echo "$BASE" | cut -d. -f2)
          PATCH=$(echo "$BASE" | cut -d. -f3)
          CURRENT_PRE_TYPE=$(echo "$CURRENT" | sed -n 's/.*-\([a-z]*\)\.\([0-9]*\)$/\1/p')
          CURRENT_PRE_NUM=$(echo "$CURRENT" | sed -n 's/.*-\([a-z]*\)\.\([0-9]*\)$/\2/p')

          # Validate inputs.
          if [ "$BUMP" = "none" ] && [ "$PRERELEASE" = "no" ]; then
            echo "::error::bump=none requires a prerelease label"
            exit 1
          fi
          if [ "$BUMP" = "stable" ] && [ -z "$CURRENT_PRE_TYPE" ]; then
            echo "::error::bump=stable requires a current prerelease version"
            exit 1
          fi

          # Apply version bump.
          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
            stable|none) ;; # keep base version as-is
          esac

          VERSION="${MAJOR}.${MINOR}.${PATCH}"

          # Apply prerelease suffix.
          if [ "$BUMP" = "stable" ] || [ "$PRERELEASE" = "no" ]; then
            : # stable release, no suffix
          elif [ "$BUMP" = "none" ] && [ "$CURRENT_PRE_TYPE" = "$PRERELEASE" ]; then
            # Same prerelease type, just increment the number.
            PRE_NUM=$((${CURRENT_PRE_NUM:-0} + 1))
            VERSION="${VERSION}-${PRERELEASE}.${PRE_NUM}"
          else
            # New prerelease series.
            VERSION="${VERSION}-${PRERELEASE}.1"
          fi

          echo "New version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # Update all version sources.
          sed -i "0,/^version .*/s//version       = \"$VERSION\"/" nopal.nimble
          sed -i "s/^PKG_VERSION:=.*/PKG_VERSION:=$VERSION/" openwrt/Makefile
          sed -i "s/Version = \".*\"/Version = \"$VERSION\"/" src/nopal.nim
          sed -i "s/version: \".*\",/version: \"$VERSION\",/" src/ipc/methods.nim

          # Commit via GitHub API (signed).
          make_blob() {
            base64 -w 0 "$1" | jq -Rs '{content: ., encoding: "base64"}' | \
              gh api repos/${{ github.repository }}/git/blobs --input - --jq '.sha'
          }

          NIMBLE_BLOB=$(make_blob nopal.nimble)
          MAKEFILE_BLOB=$(make_blob openwrt/Makefile)
          NOPAL_BLOB=$(make_blob src/nopal.nim)
          METHODS_BLOB=$(make_blob src/ipc/methods.nim)

          TREE_SHA=$(gh api repos/${{ github.repository }}/git/trees \
            --input <(jq -n \
              --arg base "${{ github.sha }}" \
              --arg nimble "$NIMBLE_BLOB" \
              --arg makefile "$MAKEFILE_BLOB" \
              --arg nopal "$NOPAL_BLOB" \
              --arg methods "$METHODS_BLOB" \
              '{base_tree: $base, tree: [
                {path: "nopal.nimble", mode: "100644", type: "blob", sha: $nimble},
                {path: "openwrt/Makefile", mode: "100644", type: "blob", sha: $makefile},
                {path: "src/nopal.nim", mode: "100644", type: "blob", sha: $nopal},
                {path: "src/ipc/methods.nim", mode: "100644", type: "blob", sha: $methods}
              ]}') \
            --jq '.sha')

          COMMIT_SHA=$(gh api repos/${{ github.repository }}/git/commits \
            -f message="Release v${VERSION}" \
            -f tree="$TREE_SHA" \
            -f "parents[]=${{ github.sha }}" \
            --jq '.sha')

          # Update branch ref.
          gh api repos/${{ github.repository }}/git/refs/heads/${{ github.ref_name }} \
            -X PATCH \
            -f sha="$COMMIT_SHA"

          # Create tag.
          gh api repos/${{ github.repository }}/git/refs \
            -f ref="refs/tags/v${VERSION}" \
            -f sha="$COMMIT_SHA"

          echo "commit_sha=$COMMIT_SHA" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  compile:
    name: Build (${{ matrix.openwrt_arch }})
    needs: prepare-version
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/coreyleavitt/nopal-toolchain:latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - openwrt_arch: aarch64_cortex-a53
            nim_target: aarch64
          - openwrt_arch: arm_cortex-a7
            nim_target: armv7hf
          - openwrt_arch: mips_24kc
            nim_target: mips
          - openwrt_arch: mipsel_24kc
            nim_target: mipsel
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-version.outputs.commit_sha }}

      - name: Cross-compile nopal
        run: nim c -d:release -d:https -d:${{ matrix.nim_target }} src/nopal.nim

      - name: Prepare binary
        run: |
          mv src/nopal nopald
          ls -lh nopald

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.openwrt_arch }}
          path: nopald

  package-ipk:
    needs: [prepare-version, compile]
    uses: ./.github/workflows/package-ipk.yaml
    with:
      version: ${{ needs.prepare-version.outputs.version }}
      pkg_release: "1"

  package-apk:
    needs: [prepare-version, compile]
    uses: ./.github/workflows/package-apk.yaml
    with:
      version: ${{ needs.prepare-version.outputs.version }}
      pkg_release: "1"

  release:
    name: Create release
    needs: [prepare-version, compile, package-ipk, package-apk]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          for dir in artifacts/binary-*; do
            arch="${dir#artifacts/binary-}"
            cp "$dir/nopald" "release/nopald_${arch}"
          done
          for dir in artifacts/ipk-*; do
            cp "$dir"/*.ipk release/
          done
          for dir in artifacts/apk-*; do
            cp "$dir"/*.apk release/
          done
          cd release && sha256sum * > SHA256SUMS

      - name: Create GitHub release
        run: |
          VERSION="${{ needs.prepare-version.outputs.version }}"
          if echo "$VERSION" | grep -qE '\-(alpha|beta|rc)\.'; then
            gh release create "v$VERSION" release/* --repo ${{ github.repository }} --generate-notes --prerelease
          else
            gh release create "v$VERSION" release/* --repo ${{ github.repository }} --generate-notes
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
